<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plant ID Flashcards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7f0;color:#1a2e1a;min-height:100vh}
button{cursor:pointer;font-family:inherit}
.bar{background:#1a2e1a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.bar h1{font-size:18px;font-weight:500;color:#e8f4e0}
.bar h1 span{font-size:12px;color:#7aaa70;font-weight:400}
.nav{display:flex;gap:4px}
.nav-btn{background:transparent;color:#7aaa70;border:none;border-radius:4px;padding:5px 13px;font-size:12px}
.nav-btn.on,.nav-btn:hover{background:#3d6b3d;color:#fff}
.body{max-width:600px;margin:0 auto;padding:24px 16px}
.label{font-size:11px;color:#6a8a6a;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.pill{border:1px solid #c0d8b0;border-radius:20px;padding:4px 14px;font-size:12px;background:#fff;color:#3d6b3d}
.pill.on{background:#3d6b3d;color:#fff;border-color:#3d6b3d}
.start{width:100%;padding:13px;border-radius:8px;border:none;background:#3d9b6a;color:#fff;font-size:16px;margin-bottom:28px}
.start:hover{background:#2d7a52}
.photo-card{position:relative;border-radius:12px;overflow:hidden;border:1px solid #c8dab8;background:#fff;margin-bottom:14px}
.photo-card img{width:100%;display:block;max-height:380px;object-fit:contain}
.wk{position:absolute;top:10px;left:10px;background:rgba(26,46,26,.65);color:#d0ecc0;border-radius:4px;padding:2px 8px;font-size:11px}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;justify-content:center}
.dot{width:9px;height:9px;border-radius:50%;background:#c0d8b0}
.dot.ok{background:#3d9b6a}.dot.bad{background:#b84040}
.counter{text-align:center;font-size:12px;color:#6a8a6a;font-family:monospace;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.choice{padding:10px 12px;border-radius:8px;border:1px solid #c0d8b0;background:#fff;text-align:left;font-size:13px;line-height:1.5;color:#1a2e1a;transition:border-color .12s,background .12s}
.choice:hover:not(:disabled){border-color:#3d9b6a;background:#f0faf4}
.choice.correct{border-color:#3d9b6a!important;background:#f0faf4!important}
.choice.wrong{border-color:#b84040!important;background:#fdf0f0!important}
.main{display:block;font-style:italic}
.main.normal{font-style:normal}
.sub{display:none;font-size:11px;color:#7a9a7a;margin-top:2px}
.choice.answered .sub{display:block}
.reveal{border:1px solid #c0d8b0;border-radius:10px;padding:18px;margin-bottom:12px;text-align:center;background:#fff}
.reveal .lat{font-size:22px;font-style:italic;margin-bottom:4px}
.reveal .com{font-size:17px;color:#3d6b3d;font-weight:600}
.row{display:flex;gap:8px;margin-bottom:10px}
.btn{flex:1;padding:10px;border-radius:8px;border:1px solid #c0d8b0;background:#fff;color:#3d6b3d;font-size:14px}
.btn.primary{background:#3d9b6a;color:#fff;border-color:#3d9b6a}
.btn.danger{background:#b84040;color:#fff;border-color:#b84040}
.btn.ghost{background:none;border:none;color:#8aaa80;font-size:12px}
.sum-icon{font-size:52px;text-align:center;margin-bottom:8px}
.sum-score{font-size:26px;text-align:center;margin-bottom:4px}
.sum-sub{text-align:center;color:#6a8a6a;font-size:13px;margin-bottom:20px}
.log{max-height:280px;overflow-y:auto;border:1px solid #c0d8b0;border-radius:10px;padding:8px 12px;background:#fff;margin-bottom:16px}
.log-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #e8f0e0;font-size:12px}
.log-row:last-child{border:none}
.stat-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e0ead8;font-size:12px}
.bar2{height:6px;border-radius:3px;background:#c0d8b0;flex:1}
.bar2-fill{height:100%;border-radius:3px;background:#3d9b6a}
</style>
</head>
<body>
<div class="bar">
  <h1>&#127807; Plant ID Flashcards &nbsp;<span id="plant-count"></span></h1>
  <div class="nav">
    <button class="nav-btn on" id="nb-study" onclick="showScreen('menu')">Study</button>
    <button class="nav-btn" id="nb-all" onclick="showScreen('manage')">All Plants</button>
  </div>
</div>
<div class="body">
  <div id="screen-menu">
    <div class="label">Week</div>
    <div class="pills" id="week-pills"></div>
    <div class="label">Quiz type</div>
    <div class="pills">
      <button class="pill on" id="btn-mc" onclick="setMode('mc')">Multiple choice</button>
      <button class="pill" id="btn-fc" onclick="setMode('fc')">Flashcard</button>
    </div>
    <div class="label">Answer with</div>
    <div class="pills">
      <button class="pill on" id="btn-latin" onclick="setPrompt('latin')">Latin name</button>
      <button class="pill" id="btn-common" onclick="setPrompt('common')">Common name</button>
      <button class="pill" id="btn-both" onclick="setPrompt('both')">Both</button>
    </div>
    <button class="start" onclick="startQuiz()">Start quiz &rarr;</button>
    <div class="label">Your progress</div>
    <div id="stats-list"></div>
  </div>
  <div id="screen-quiz" style="display:none">
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter"></div>
    <div class="photo-card">
      <img id="quiz-img" src="" alt="Identify this plant">
      <span class="wk" id="quiz-week"></span>
    </div>
    <div id="quiz-body"></div>
    <div style="text-align:center;margin-top:6px">
      <button class="btn ghost" onclick="showScreen('menu')">&larr; menu</button>
    </div>
  </div>
  <div id="screen-summary" style="display:none">
    <div class="sum-icon" id="sum-icon"></div>
    <div class="sum-score" id="sum-score"></div>
    <div class="sum-sub" id="sum-sub"></div>
    <div class="log" id="sum-log"></div>
    <div class="row">
      <button class="btn primary" onclick="startQuiz()">Try again</button>
      <button class="btn" onclick="showScreen('menu')">Menu</button>
    </div>
  </div>
  <div id="screen-manage" style="display:none">
    <div id="manage-list"></div>
  </div>
</div>

<script>
var stats = JSON.parse(localStorage.getItem('plant_stats_v5') || '{}');
var deck = [], cardIdx = 0, chosen = null, revealed = false, sessionLog = [];
var quizMode = 'mc', promptWith = 'latin', filterWeek = 'all';

function saveStats() { localStorage.setItem('plant_stats_v5', JSON.stringify(stats)); }

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = b[i]; b[i] = b[j]; b[j] = tmp;
  }
  return b;
}

function buildWeekPills() {
  var weeks = [];
  PLANTS.forEach(function(p) { if (weeks.indexOf(p.week) === -1) weeks.push(p.week); });
  weeks.sort(function(a,b){return a-b;});
  var html = '<button class="pill on" id="wk-all" onclick="setWeek(&quot;all&quot;)">All (' + PLANTS.length + ')</button>';
  weeks.forEach(function(w) {
    var n = PLANTS.filter(function(p){return p.week===w;}).length;
    html += '<button class="pill" id="wk-' + w + '" onclick="setWeek(' + w + ')">Week ' + w + ' (' + n + ')</button>';
  });
  document.getElementById('week-pills').innerHTML = html;
  document.getElementById('plant-count').textContent = weeks.length + ' week' + (weeks.length>1?'s':'') + ' \u00b7 ' + PLANTS.length + ' plants';
}

function setWeek(w) {
  filterWeek = w;
  var btns = document.querySelectorAll('[id^="wk-"]');
  btns.forEach(function(b) { b.classList.toggle('on', b.id === 'wk-' + w); });
  renderStats();
}

function getPool() {
  return filterWeek === 'all' ? PLANTS : PLANTS.filter(function(p){return p.week===filterWeek;});
}

function showScreen(s) {
  ['menu','quiz','summary','manage'].forEach(function(x) {
    document.getElementById('screen-'+x).style.display = x===s ? 'block' : 'none';
  });
  document.getElementById('nb-study').classList.toggle('on', s !== 'manage');
  document.getElementById('nb-all').classList.toggle('on', s === 'manage');
  if (s === 'menu') renderStats();
  if (s === 'manage') renderManage();
}

function setMode(m) {
  quizMode = m;
  document.getElementById('btn-mc').classList.toggle('on', m==='mc');
  document.getElementById('btn-fc').classList.toggle('on', m==='fc');
}

function setPrompt(p) {
  promptWith = p;
  ['latin','common','both'].forEach(function(x) {
    document.getElementById('btn-'+x).classList.toggle('on', x===p);
  });
}

function startQuiz() {
  var pool = getPool();
  if (pool.length < 2) { alert('Need at least 2 plants to quiz.'); return; }
  deck = shuffle(pool);
  cardIdx = 0; chosen = null; revealed = false; sessionLog = [];
  showScreen('quiz');
  renderCard();
}

function renderCard() {
  var c = deck[cardIdx];
  var dotsHtml = '';
  deck.forEach(function(_,i) {
    var cls = 'dot';
    if (i < sessionLog.length) cls += sessionLog[i].correct ? ' ok' : ' bad';
    dotsHtml += '<div class="' + cls + '"></div>';
  });
  document.getElementById('dots').innerHTML = dotsHtml;
  document.getElementById('counter').textContent = (cardIdx+1) + ' / ' + deck.length;
  document.getElementById('quiz-img').src = c.img;
  document.getElementById('quiz-week').textContent = 'Week ' + c.week;
  if (quizMode === 'mc') renderMC(c);
  else renderFC(c);
}

function renderMC(c) {
  var pool = getPool();
  var others = shuffle(pool.filter(function(p){return p.id!==c.id;})).slice(0, Math.min(3, pool.length-1));
  var choices = shuffle([c].concat(others));
  var lbl = promptWith==='common' ? 'What is the common name?' :
            promptWith==='latin'  ? 'What is the Latin name?' : 'Give both Latin and common name';
  var choiceHTML = '';
  choices.forEach(function(p, i) {
    var mainText, mainClass, subText, subStyle;
    subStyle = '';
    if (promptWith === 'latin') {
      mainText = p.latin; mainClass = 'main'; subText = p.common;
    } else if (promptWith === 'common') {
      mainText = p.common; mainClass = 'main normal'; subText = p.latin;
    } else {
      mainText = p.latin; mainClass = 'main'; subText = p.common; subStyle = 'display:block';
    }
    var ids = choices.map(function(x){return x.id;}).join(',');
    choiceHTML += '<button class="choice" id="ch' + i + '" onclick="pick(' + i + ',' + p.id + ',[' + ids + '])">' +
      '<span class="' + mainClass + '">' + mainText + '</span>' +
      '<span class="sub" style="' + subStyle + '">' + subText + '</span>' +
      '</button>';
  });
  document.getElementById('quiz-body').innerHTML =
    '<div style="font-size:12px;color:#6a8a6a;text-align:center;margin-bottom:8px">' + lbl + '</div>' +
    '<div class="grid">' + choiceHTML + '</div>';
}

function pick(i, pickedId, ids) {
  if (chosen !== null) return;
  chosen = pickedId;
  var cid = deck[cardIdx].id;
  ids.forEach(function(id, j) {
    var b = document.getElementById('ch' + j);
    b.disabled = true;
    b.classList.add('answered');
    if (id === cid) b.classList.add('correct');
    else if (j === i && id !== cid) b.classList.add('wrong');
  });
  setTimeout(function(){ advance(pickedId === cid); }, pickedId === cid ? 900 : 2200);
}

function renderFC(c) {
  if (!revealed) {
    document.getElementById('quiz-body').innerHTML =
      '<button class="btn" style="width:100%;margin-bottom:10px" onclick="revealFC()">Reveal answer</button>';
  } else {
    document.getElementById('quiz-body').innerHTML =
      '<div class="reveal"><div class="lat">' + c.latin + '</div><div class="com">' + c.common + '</div></div>' +
      '<div class="row">' +
      '<button class="btn danger" onclick="advance(false)">&#10007; Missed</button>' +
      '<button class="btn primary" onclick="advance(true)">&#10003; Got it</button>' +
      '</div>';
  }
}

function revealFC() { revealed = true; renderFC(deck[cardIdx]); }

function advance(correct) {
  var c = deck[cardIdx];
  if (!stats[c.id]) stats[c.id] = {correct:0, total:0};
  stats[c.id].correct += correct ? 1 : 0;
  stats[c.id].total += 1;
  saveStats();
  sessionLog.push({plant:c, correct:correct});
  cardIdx++;
  if (cardIdx >= deck.length) { showSummary(); return; }
  chosen = null; revealed = false;
  renderCard();
}

function showSummary() {
  var ok = sessionLog.filter(function(l){return l.correct;}).length;
  var pct = ok / deck.length;
  document.getElementById('sum-icon').innerHTML = pct>=.9 ? '&#127800;' : pct>=.6 ? '&#127807;' : '&#129716;';
  document.getElementById('sum-score').textContent = ok + ' / ' + deck.length + ' correct';
  document.getElementById('sum-sub').textContent = pct>=.9 ? 'Excellent!' : pct>=.6 ? 'Good \u2014 keep reviewing.' : 'Keep at it.';
  var logHtml = '';
  sessionLog.forEach(function(l) {
    logHtml += '<div class="log-row">' +
      '<span style="color:' + (l.correct?'#3d9b6a':'#b84040') + ';min-width:18px">' + (l.correct?'&#10003;':'&#10007;') + '</span>' +
      '<span style="flex:1;font-style:italic">' + l.plant.latin + '</span>' +
      '<span style="color:#5a7a5a">' + l.plant.common + '</span>' +
      '</div>';
  });
  document.getElementById('sum-log').innerHTML = logHtml;
  showScreen('summary');
}

function renderStats() {
  var pool = getPool();
  var html = '';
  pool.forEach(function(p) {
    var s = stats[p.id];
    var pct = s && s.total ? s.correct / s.total : null;
    var pctW = pct === null ? 0 : Math.round(pct * 100);
    var pctTxt = pct === null ? '&mdash;' : Math.round(pct*100) + '%';
    var col = pct === null ? '#a0b8a0' : pct >= .8 ? '#3d9b6a' : '#b84040';
    html += '<div class="stat-row">' +
      '<span style="flex:2;font-style:italic;font-size:12px">' + p.latin + '</span>' +
      '<span style="color:#5a7a5a;font-size:11px;min-width:90px">' + p.common + '</span>' +
      '<div class="bar2"><div class="bar2-fill" style="width:' + pctW + '%"></div></div>' +
      '<span style="font-size:11px;font-family:monospace;min-width:32px;text-align:right;color:' + col + '">' + pctTxt + '</span>' +
      '</div>';
  });
  document.getElementById('stats-list').innerHTML = html;
}

function renderManage() {
  var weeks = [];
  PLANTS.forEach(function(p){ if(weeks.indexOf(p.week)===-1) weeks.push(p.week); });
  weeks.sort(function(a,b){return a-b;});
  var html = '';
  weeks.forEach(function(w) {
    var wPlants = PLANTS.filter(function(p){return p.week===w;});
    html += '<div class="label" style="margin:16px 0 8px">Week ' + w + ' &mdash; ' + wPlants.length + ' plants</div>';
    wPlants.forEach(function(p) {
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #e0ead8">' +
        '<img src="' + p.img + '" style="width:72px;height:48px;object-fit:cover;border-radius:4px;border:1px solid #c0d8b0;flex-shrink:0">' +
        '<div><div style="font-style:italic;font-size:13px">' + p.latin + '</div>' +
        '<div style="color:#5a7a5a;font-size:12px">' + p.common + '</div></div>' +
        '</div>';
    });
  });
  document.getElementById('manage-list').innerHTML = html;
}

buildWeekPills();
renderStats();
</script>
</body>
</html>
